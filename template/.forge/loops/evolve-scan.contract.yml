# Framework: FORGE
# Loop contract — evolve-scan (Spec 459)
#
# Reuses the Spec 458 loop-contract shape (docs/process-kit/signal-to-strategy-loop.md
# §1 "Loop contract (one page)"). One green, artifact-producing, lifecycle-neutral
# routine. See docs/process-kit/scheduled-routines-guide.md for the prose contract.
#
# GREEN ROUTINE INVARIANT (Spec 459 Constraints): artifact-producing only. This is a
# SCAN — it surfaces process/watchlist items only. It MUST NOT run the full /evolve
# loop, advance the spec lifecycle, expand autonomy, or modify shared systems.
# Forbidden actions are enumerated below and are grep-verifiable.

name: evolve-scan
purpose: >
  Run a lightweight /evolve SCAN that surfaces process-health and watchlist items
  only — stale guides, fired watchlist triggers, accumulated signals, acceptance-rate
  drift — and deposits them into the triage inbox. It does NOT run the full evolve
  loop, propose autonomy changes, or advance any spec.

trigger: scheduled            # cadence-driven; see cadence
cadence: biweekly             # operator-tunable via forge.routines.cadence (AGENTS.md)
class: green                  # green = artifact-producing, lifecycle-neutral
execution_mode: on-box        # on-box (default) | remote (InfoSec-approval-gated)
pausable: true                # operator can pause without losing state

inputs:
  read_only: true
  scope:
    - docs/sessions/signals.md          # accumulated signals
    - docs/sessions/watchlist.md        # trigger conditions
    - docs/process-kit/*.md             # freshness (Last verified: markers)
    - docs/sessions/*.json              # acceptance-rate data (read-only)
  selection: "process-health signals; watchlist items whose trigger condition has fired; guides past freshness_threshold_days"

allowed_actions:
  - "Read signals, watchlist, process-kit guides, and session JSON sidecars."
  - "Detect stale guides, fired watchlist triggers, and acceptance-rate drift (read-only)."
  - "Write a scan summary to the triage inbox (docs/sessions/triage/)."
  - "Recommend (not perform) watchlist graduation or a process spec — operator decides."

outputs:
  triage_inbox: docs/sessions/triage/        # evolve-scan-<YYYY-MM-DD>.md
  existing_artifact_destinations: []          # scan is read-only; recommendations land only in triage
  # NEVER writes to lifecycle-advancing states, autonomy config, or budget config.

# --- Forbidden actions (Spec 459 AC2 — grep-verifiable) ---
forbidden_actions:
  - "/implement"                 # MUST NOT dispatch — no implementation
  - "/close"                     # MUST NOT dispatch — no lifecycle close
  - "git commit"                 # MUST NOT commit
  - "git push"                   # MUST NOT push
  - "autonomy config write"      # MUST NOT write autonomy level / auto_progression
  - "budget config write"        # MUST NOT write budget ceilings / swarm budget
  - "full /evolve loop"          # MUST NOT run the full evolve loop (scan only)
  - "spec lifecycle advance"     # MUST NOT change a spec's Status field

stop_conditions:
  - "Scan summary written to triage with all surfaced items."
  - "No stale guides, fired triggers, or drift detected."
  - "Operator pauses the routine (pausable: true)."
  - "One scan artifact produced per run — do not loop into a full /evolve."

escalation_boundary: >
  The scan never performs the /evolve loop's calibration or autonomy/trust changes.
  Any change to autonomy, budgets, or the spec lifecycle is the operator's explicit
  current-turn decision (likely via a real /evolve or /config-change), never this routine.

verification:
  - "grep the forbidden_actions block lists /implement, /close, git commit, autonomy/budget writes, and 'full /evolve loop'."
  - "Confirm outputs land only under docs/sessions/triage/ (no lifecycle/autonomy/budget writes)."
