# .forge/update-manifest.yaml
# Controls how /forge init legacy-upgrade classifies files.
# Categories: framework (overwrite), project (never touch), merge (intelligent merge)
# See: Spec 072

framework:
  description: "FORGE-owned files — always overwrite during upgrade"
  # Note: .claude/commands/ files require conflict detection before overwriting.
  # If an existing file does NOT carry the "# Framework: FORGE" or "## Subcommand:"
  # marker within the first 10 lines after its YAML frontmatter (Spec 385 — structural
  # skip-past-`---` detection), it is a project-specific command and must go through
  # conflict resolution (Step L2b) rather than being silently overwritten.
  paths:
    - ".forge/"
    - ".claude/commands/approve.md"
    - ".claude/commands/bootstrap.md"
    - ".claude/commands/brainstorm.md"
    - ".claude/commands/bug.md"
    - ".claude/commands/close.md"
    - ".claude/commands/config-change.md"
    - ".claude/commands/configure-nanoclaw.md"
    - ".claude/commands/configure.md"  # Spec 266 — new: post-onboarding advanced settings menu
    - ".claude/commands/consensus.md"  # Spec 395 — classification added during final-draft consensus convention work (gap closure)
    - ".claude/commands/forge.md"
    - ".claude/commands/handoff.md"
    - ".claude/commands/harvest.md"
    - ".claude/commands/implement.md"
    - ".claude/commands/insights.md"
    - ".claude/commands/matrix.md"
    - ".claude/commands/nanoclaw.md"
    - ".claude/commands/note.md"
    - ".claude/commands/now.md"
    - ".claude/commands/onboarding.md"  # Spec 266 — classification added during onboarding simplification
    - ".claude/commands/evolve.md"
    - ".claude/commands/explore.md"  # Spec 392 — classification added during topic-overlap pre-check work
    - ".claude/commands/parallel.md"
    - ".claude/commands/retro.md"
    - ".claude/commands/revise.md"
    - ".claude/commands/scheduler.md"
    - ".claude/commands/score.md"
    - ".claude/commands/session.md"
    - ".claude/commands/skills.md"
    - ".claude/commands/spec-gate.md"
    - ".claude/commands/spec.md"
    - ".claude/commands/synthesize.md"  # Spec 328 — classification added during /synthesize mode-recommendation + --all flag work
    - ".claude/commands/tab.md"
    - ".claude/commands/test.md"
    - ".claude/commands/trace.md"
    - ".claude/commands/validate.md"
    - ".claude/commands/configure-nanoclaw.md"
    - ".claude/commands/nanoclaw.md"
    - ".claude/commands/forge-init.md"
    - "docs/process-kit/"
    - "docs/process-kit/prompt-caching-consumer-guide.md"  # Spec 271 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/process-kit/command-authoring-guide.md"  # Spec 265 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/process-kit/permissions-team-policy.md"  # Spec 275 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/process-kit/signal-quality-guide.md"  # Spec 267 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/process-kit/onboarding-recovery.md"  # Spec 315 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/process-kit/advisory-to-strict-flip-plan.md"  # Spec 332 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/process-kit/consensus-protocol.md"  # Spec 395 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/process-kit/final-draft-consensus-guide.md"  # Spec 395 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/process-kit/lane-b-audit-conventions.md"  # Spec 395 — new file; covered by docs/process-kit/ wildcard above, listed explicitly for traceability
    - "docs/publications/"
    - "docs/compliance/"
    - ".devcontainer/"
    - ".claude/settings.json.template"
    - "docker-compose.nanoclaw.yml"
    - "docs/decisions/ADR-028-spec-status-source-of-truth.md"
    - "scripts/validate-authorization-rules.sh"  # Spec 327 — FORGE-shipped framework linter
    - "scripts/validate-authorization-rules.ps1"  # Spec 327 — PS parity (overrides *.ps1 project-default below)
    - "scripts/auth-rules-whitelist.yaml"  # Spec 327 — operator-curated; framework-shipped stub
    - "scripts/validate-agents-md-drift.sh"  # Spec 330 — FORGE-shipped prose↔YAML drift detector
    - "scripts/validate-agents-md-drift.ps1"  # Spec 330 — PS parity (overrides *.ps1 project-default below)
    - "scripts/agents-md-action-aliases.yaml"  # Spec 330 — operator-curated alias map; framework-shipped stub
    - "scripts/tests/test-close-commit-ordering.sh"  # Spec 348 — FORGE-shipped /close commit-ordering regression test
    - "scripts/tests/test-close-commit-ordering.ps1"  # Spec 348 — PS parity (overrides *.ps1 project-default below)
    - "scripts/tests/test-bodies-equal-crlf.sh"  # Spec 350 — bodies_equal CRLF normalization regression test
    - "scripts/safety-backfill-audit.sh"  # Spec 387 — Component C one-time audit (FORGE-shipped)
    - "scripts/safety-backfill-audit.ps1"  # Spec 387 — PS parity (overrides *.ps1 project-default below)
    - "scripts/migrate-to-derived-view.py"  # Spec 254 — Approach D one-shot migration; FORGE-shipped

project:
  description: "Project-owned files — never touch during upgrade"
  paths:
    - "docs/specs/[0-9]*.md"
    - "docs/specs/README.md"
    - "docs/specs/CHANGELOG.md"
    - "docs/sessions/"
    - "docs/backlog.md"
    - "docs/decisions/*.md"       # except ADRs shipped with FORGE
    - "MEMORY.md"
    - ".claude/session-state.json"
    - ".claude/checkpoints/"
    - ".claude/session-inputs/"
    - ".forge/state/events/"           # Spec 254 — Approach D per-spec event streams (project-scoped state, never overwritten on upgrade)
    - ".env"
    - ".env.*"
    - "src/"
    - "app/"
    - "db/"
    - "*.ps1"                     # project deploy/build scripts

merge:
  description: "Mixed framework + project content — section-based merge"
  paths:
    - "CLAUDE.md"
    - "AGENTS.md"
    - ".gitignore"
    - ".mcp.json"
    - ".mcp-lock/"  # Spec 284 — vendored hash-verified lockfiles for MCP servers. Operator may add entries; never strip.

obsolete:
  description: "Old FORGE/EGID files superseded by current versions"
  mappings:
    ".claude/commands/forge-light.md": "renamed to forge-init.md (Spec 165 — same command, unified file name)"
    ".claude/commands/egid.md": "replaced by forge.md"
    ".claude/commands/confirm.md": "replaced by delegation guardrails in AGENTS.md"
    ".claude/commands/delegate.md": "replaced by delegation guardrails in AGENTS.md"
    ".claude/commands/revoke.md": "replaced by delegation guardrails in AGENTS.md"
    ".claude/commands/status.md": "replaced by now.md"
    ".claude/commands/infer.md": "replaced by insights.md"
    ".claude/commands/sync.md": "replaced by /forge stoke"
    ".claude/commands/triage.md": "replaced by bug.md + score.md"
    ".claude/commands/housekeeping.md": "functionality merged into /close and /session"
    ".claude/commands/audit.md": "replaced by config-change.md"
    "docs/workflow/egid-flowchart.md": "replaced by docs/process-kit/spec-driven-harness-loop.md"
    "docs/workflow/egid-workflow.html": "replaced by docs/publications/"
    "docs/workflow/executive-reporting.md": "replaced by docs/process-kit/runbook.md"
    "docs/workflow/inference-playbook.md": "replaced by docs/process-kit/parallelism-guide.md"
    "docs/workflow/pre-spec-intake.md": "replaced by docs/process-kit/prd-interview.md"
    "docs/workflow/evaluation-validity.md": "replaced by docs/process-kit/scoring-rubric.md"

removed:
  description: "Files deleted from the FORGE template — remove from consumer projects during /forge stoke"
  paths:
    - ".claude/commands/forge-light.md"
    - ".forge/commands/forge-light.md"
    - "docs/workflow/spec-driven-harness-loop.md"
