command: spec
type: slash-command

structure:
  required_sections:
    - "## "
  required_strings:
    - "draft"
    - "scoring-rubric.md"
    - "README.md"
    - "CHANGELOG.md"
    - "backlog.md"
    - "_template.md"
  forbidden_strings:
    - "TODO"
    - "FIXME"
  max_lines: 400
  min_lines: 30

references:
  files_must_exist:
    - "docs/specs/_template.md"
    - "docs/specs/README.md"
    - "docs/specs/CHANGELOG.md"
    - "docs/backlog.md"
    - "docs/process-kit/scoring-rubric.md"
  commands_must_exist:
    - "implement"
    - "revise"

template_vars:
  must_not_contain_raw:
    - "cookiecutter."

model_tier:
  expected: "sonnet"

frontmatter:
  required_fields:
    - "name"
    - "description"
    - "model_tier"
    - "workflow_stage"
  expected_values:
    name: "spec"
    model_tier: "sonnet"
    workflow_stage: "planning"
