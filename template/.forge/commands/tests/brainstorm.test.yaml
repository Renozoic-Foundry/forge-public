command: brainstorm
type: slash-command

structure:
  required_sections:
    - "## "
  required_strings:
    - "roadmap.md"
    - "signals.md"
    - "scratchpad.md"
    - "backlog.md"
    - "scoring-rubric.md"
    - "BV"
  forbidden_strings:
    - "TODO"
    - "FIXME"
  max_lines: 250
  min_lines: 30

references:
  files_must_exist:
    - "docs/backlog.md"
    - "docs/process-kit/scoring-rubric.md"
  commands_must_exist:
    - "spec"
    - "implement"
    - "evolve"

template_vars:
  must_not_contain_raw:
    - "cookiecutter."

model_tier:
  expected: "haiku"

frontmatter:
  required_fields:
    - "name"
    - "description"
    - "model_tier"
    - "workflow_stage"
  expected_values:
    name: "brainstorm"
    model_tier: "haiku"
    workflow_stage: "planning"
