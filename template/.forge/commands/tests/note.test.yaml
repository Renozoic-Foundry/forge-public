command: note
type: slash-command

structure:
  required_strings:
    - "scratchpad.md"
    - "[validate]"
    - "[session]"
    - "[evolve]"
    - "[ ]"
  forbidden_strings:
    - "TODO"
    - "FIXME"
  max_lines: 100
  min_lines: 10

references:
  files_must_exist: []
  commands_must_exist:
    - "close"
    - "session"
    - "evolve"

template_vars:
  must_not_contain_raw:
    - "cookiecutter."


frontmatter:
  required_fields:
    - "name"
    - "description"
    - "workflow_stage"
  expected_values:
    name: "note"
    workflow_stage: "session"
