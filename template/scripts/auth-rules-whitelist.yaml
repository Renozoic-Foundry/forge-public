# scripts/auth-rules-whitelist.yaml — Spec 327 lint-gate whitelist
#
# Entries here exempt a specific (file, action) pair from the authorization-rule lint gate.
# Each entry MUST include:
#   - file:    Specific file path (no wildcards) — relative to repo root
#   - action:  Action name from the AGENTS.md structured block (e.g., git_push, gh_pr_create)
#   - reason:  Human-readable justification — required, not optional
